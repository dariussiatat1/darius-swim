<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    
    <title>[darius swim]</title>

    <style>
        :root {
            --primary-color: #ff0000;
            --bg-dark: #0f0f0f;
            --text-main: #ffffff;
            --text-muted: #cccccc;
            --transition-speed: 0.4s;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% -20%, #222, var(--bg-dark));
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding-bottom: 80px;
            overflow-x: hidden;
        }

        /* Logo */
        .logo-container {
            padding: 40px 0;
        }
        
        .logo-container img {
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .logo-container img:hover {
            transform: scale(1.05);
        }

        /* Grid Setup - Centrat cu margini mari pe desktop */
        .movie-grid-container {
            padding: 0 15px;
            margin: 0 auto;
            width: 100%;
        }

        /* Configurație Desktop (6 pe rând + margini) */
        @media (min-width: 1200px) {
            .movie-grid-container {
                /* Limităm lățimea la 85% pentru a lăsa spațiu pe margini */
                max-width: 85%; 
            }

            .col-six {
                /* 100% / 6 = 16.66% */
                flex: 0 0 16.666667%;
                max-width: 16.666667%;
                padding: 12px;
            }
        }

        /* Configurație Tabletă (3 pe rând) */
        @media (min-width: 768px) and (max-width: 1199px) {
            .col-six {
                flex: 0 0 33.333333%;
                max-width: 33.333333%;
                padding: 10px;
            }
        }

        /* Configurație Mobil (2 pe rând) */
        @media (max-width: 767px) {
            .col-six {
                flex: 0 0 50%;
                max-width: 50%;
                padding: 8px;
            }
        }

        /* Movie Card */
        .movie-card {
            position: relative;
            margin-bottom: 25px;
            cursor: pointer;
        }

        .poster-wrapper {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: all var(--transition-speed) ease;
        }

        .movie-poster {
            width: 100%;
            height: auto;
            aspect-ratio: 2/3;
            object-fit: cover;
            display: block;
            transition: transform 0.6s ease;
        }

        /* Overlay */
        .card-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            opacity: 0;
            transition: opacity var(--transition-speed);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-icon {
            font-size: 2.5rem;
            color: white;
            transform: scale(0.7);
            transition: transform var(--transition-speed);
        }

        /* Hover Effects */
        .movie-card:hover .poster-wrapper {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.8);
        }

        .movie-card:hover .movie-poster {
            transform: scale(1.08);
        }

        .movie-card:hover .card-overlay {
            opacity: 1;
        }

        .movie-card:hover .play-icon {
            transform: scale(1);
        }

        /* Movie Info */
        .movie-info {
            margin-top: 12px;
            text-align: center;
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--text-muted);
            transition: color 0.3s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .movie-card:hover .movie-info {
            color: var(--text-main);
        }

        /* Scrollbar Personalizat */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-color); }
    </style>
</head>
<body>
    
    <div class="container-fluid movie-grid-container">
        <div class="text-center logo-container">
            <a href="index.html">
                <img src="logo.png" alt="[darius swim]" width="200px" class="img-fluid">
            </a>
        </div>

        <div class="row" id="movie-grid">
            <!-- Conținutul va fi injectat aici de JavaScript -->
        </div>
    </div>

    <!-- Scripturi -->
    <script src="filme.js"></script>
    <script>
        const movieGrid = document.getElementById('movie-grid');
        
        // Verificăm dacă datele din filme.js sunt încărcate
        if (typeof filme !== 'undefined') {
            filme.forEach(film => {
                const filmHTML = `
                    <div class="col-six">
                        <div class="movie-card" onclick="window.location.href='play.html?id=${encodeURIComponent(film.id)}'">
                            <div class="poster-wrapper">
                                <img src="${film.poster}" alt="${film.titlu}" class="movie-poster" loading="lazy">
                                <div class="card-overlay">
                                    <i class="fas fa-play-circle play-icon"></i>
                                </div>
                            </div>
                            <div class="movie-info">
                                ${film.titlu}
                            </div>
                        </div>
                    </div>
                `;
                movieGrid.innerHTML += filmHTML;
            });
        } else {
            console.error("Eroare: variabila 'filme' nu a fost găsită. Asigură-te că filme.js este încărcat corect.");
        }
    </script>
</body>
</html>
