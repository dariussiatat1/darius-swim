<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <title>Se încarcă...</title>
    <style>
        :root {
            --red: #e8192c;
            --bg: #0a0a0a;
            --bg2: #111;
            --border: rgba(255,255,255,0.07);
            --text: #f0f0f0;
            --muted: #888;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }

        /* ── MINIMAL TOP BAR (just logo + lang) ── */
        header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(10,10,10,0.92);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex; align-items: center; gap: 12px;
        }

        .logo-link img { height: 28px; width: auto; display: block; transition: filter 0.2s; }
        .logo-link:hover img { filter: brightness(0.7); }

        /* push lang toggle to the right */
        .header-spacer { flex: 1; }

        .lang-toggle {
            display: flex; align-items: center;
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: 8px; overflow: hidden; flex-shrink: 0;
        }
        .lang-btn {
            background: none; border: none; color: var(--muted);
            font-family: 'DM Mono', monospace; font-size: 0.72rem; font-weight: 500;
            padding: 7px 11px; cursor: pointer; transition: all 0.2s; letter-spacing: 0.04em;
        }
        .lang-btn:first-child { border-right: 1px solid var(--border); }
        .lang-btn.active { background: var(--red); color: #fff; }
        .lang-btn:not(.active):hover { color: var(--text); background: rgba(255,255,255,0.05); }

        /* ── MAIN ── */
        main {
            max-width: 960px;
            margin: 0 auto;
            padding: 24px 16px 60px;
        }

        .movie-title {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            font-weight: 700;
            margin-bottom: 18px;
            line-height: 1.2;
        }

        /* ── PLAYER ── */
        .player-box {
            background: #000;
            border-radius: 12px; overflow: hidden;
            border: 1px solid var(--border);
            position: relative; width: 100%;
            aspect-ratio: 16/9;
            box-shadow: 0 24px 60px rgba(0,0,0,0.8);
        }
        .player-box iframe,
        .player-box video {
            position: absolute; top: 0; left: 0;
            width: 100% !important; height: 100% !important;
            border: none !important; display: block;
        }

        /* ── BELOW-PLAYER BAR ── */
        .player-actions {
            margin-top: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-home {
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--bg2); border: 1px solid var(--border);
            color: var(--muted); text-decoration: none;
            font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 500;
            padding: 10px 18px; border-radius: 8px;
            transition: all 0.2s; cursor: pointer;
        }
        .btn-home:hover { border-color: rgba(255,255,255,0.2); color: var(--text); text-decoration: none; }

        .btn-home.primary {
            background: var(--red); border-color: var(--red); color: #fff;
        }
        .btn-home.primary:hover { filter: brightness(1.12); color: #fff; }

        .ad-warning {
            display: flex; align-items: center; gap: 6px;
            font-size: 0.78rem; color: var(--muted);
            background: rgba(232,25,44,0.07);
            border: 1px solid rgba(232,25,44,0.18);
            border-radius: 6px; padding: 7px 12px;
            margin-left: auto;
        }
        .ad-warning i { color: var(--red); font-size: 0.75rem; }

        @media (max-width: 500px) {
            .ad-warning { margin-left: 0; width: 100%; }
        }

        /* ── NOT FOUND ── */
        .not-found { text-align: center; padding: 80px 20px; color: var(--muted); }
        .not-found i { font-size: 3rem; display: block; margin-bottom: 16px; opacity: 0.3; }
        .not-found h2 { font-size: 1.3rem; color: var(--text); margin-bottom: 8px; }
        .not-found p { font-size: 0.9rem; margin-bottom: 24px; }
        .not-found a {
            display: inline-flex; align-items: center; gap: 7px;
            background: var(--red); color: #fff; text-decoration: none;
            padding: 10px 22px; border-radius: 8px; font-size: 0.85rem; font-weight: 600;
            transition: filter 0.2s;
        }
        .not-found a:hover { filter: brightness(1.15); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 6px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--red); }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo-link">
        <img src="logo.png" alt="[darius swim]">
    </a>
    <div class="header-spacer"></div>
    <div class="lang-toggle">
        <button class="lang-btn" data-lang="ro">RO</button>
        <button class="lang-btn" data-lang="en">EN</button>
    </div>
</header>

<main id="main-content"></main>

<script src="filme.js"></script>
<script>
    const STRINGS = {
        ro: {
            loading: 'Se încarcă...',
            back: 'Înapoi la Filme',
            home: 'Pagina principală',
            ad_warning: 'Recomandăm un <strong style="color:#f0f0f0;margin:0 3px">AdBlocker</strong> pentru o experiență mai bună.',
            not_found_title: 'Film negăsit',
            not_found_msg: id => `Nu am putut găsi filmul cu ID-ul <strong>${id}</strong>.`,
            back_short: 'Înapoi',
        },
        en: {
            loading: 'Loading...',
            back: 'Back to Movies',
            home: 'Home',
            ad_warning: 'We recommend an <strong style="color:#f0f0f0;margin:0 3px">AdBlocker</strong> for a better experience.',
            not_found_title: 'Movie not found',
            not_found_msg: id => `Could not find a title with ID <strong>${id}</strong>.`,
            back_short: 'Back',
        }
    };

    let lang = localStorage.getItem('ds_lang') || 'ro';

    function applyLang() {
        localStorage.setItem('ds_lang', lang);
        document.documentElement.lang = lang;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
        // update any rendered i18n elements
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.dataset.i18n;
            if (STRINGS[lang][key]) el.innerHTML = STRINGS[lang][key];
        });
    }

    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', () => { lang = btn.dataset.lang; applyLang(); });
    });

    // ── Render player ──
    const urlParams = new URLSearchParams(window.location.search);
    const movieId = urlParams.get('id');
    const film = filme.find(f => f.id === movieId);
    const main = document.getElementById('main-content');

    const S = STRINGS[lang];

    if (film) {
        document.title = film.titlu;

        let embed = film.codEmbed
            .replace(/\s*width=["'][^"']*["']/gi, '')
            .replace(/\s*height=["'][^"']*["']/gi, '')
            .replace(/\s*style=["'][^"']*["']/gi, '');

        main.innerHTML = `
            <h1 class="movie-title">${film.titlu}</h1>
            <div class="player-box">${embed}</div>
            <div class="player-actions">
                <a href="index.html" class="btn-home primary">
                    <i class="fas fa-arrow-left"></i>
                    <span data-i18n="back">${S.back}</span>
                </a>
                <a href="index.html" class="btn-home">
                    <i class="fas fa-home"></i>
                    <span data-i18n="home">${S.home}</span>
                </a>
                <div class="ad-warning">
                    <i class="fas fa-shield-alt"></i>
                    <span data-i18n="ad_warning">${S.ad_warning}</span>
                </div>
            </div>`;
    } else {
        document.title = S.not_found_title;
        main.innerHTML = `
            <div class="not-found">
                <i class="fas fa-film"></i>
                <h2 data-i18n="not_found_title">${S.not_found_title}</h2>
                <p>${S.not_found_msg(movieId || '?')}</p>
                <a href="index.html">
                    <i class="fas fa-arrow-left"></i>
                    <span data-i18n="back">${S.back}</span>
                </a>
            </div>`;
    }

    applyLang();
</script>
</body>
</html>
